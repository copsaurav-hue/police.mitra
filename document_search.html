    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',

  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }

  <div class="max-w-6xl mx-auto px-4 py-8">

    <header class="mb-10 text-center">
      <div class="inline-flex items-center justify-center p-3 bg-brand-100 rounded-full mb-4">
        <i data-lucide="folder-search" class="w-8 h-8 text-brand-600"></i>
      </div>
      <h1 class="text-4xl font-bold text-slate-900 mb-3">Google Drive Document Search</h1>

    <!-- Search Bar -->
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-8 sticky top-4 z-10">

        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>

      </div>
    </div>

    <!-- Category Filters -->
    <div class="flex flex-wrap gap-2 mb-8 justify-center" id="categoryFilters">
      <button class="px-4 py-2 rounded-full bg-brand-600 text-white font-medium text-sm transition-colors filter-btn" data-cat="all">All Documents</button>
      <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors filter-btn" data-cat="leave">Leave / Chhutti</button>
      <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors filter-btn" data-cat="salary">Salary / Pension</button>
      <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors filter-btn" data-cat="rules">Rules / Acts</button>
      <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors filter-btn" data-cat="other">Other Forms</button>
    </div>

    <!-- Results count -->
    <div class="text-sm text-slate-500 mb-4 font-medium" id="resultsCount">Loading documents...</div>

    <!-- Document Grid -->
    <div id="documentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

    // UI Elements
    const searchInput = document.getElementById('searchInput');
    const documentGrid = document.getElementById('documentGrid');
    const resultsCount = document.getElementById('resultsCount');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let currentCategory = 'all';
    
    // Initialize Lucide icons
    lucide.createIcons();

    function renderDocuments(query = '') {
      const lowerQuery = query.toLowerCase();
      
      const filtered = ALL_DOCS.filter(doc => {
        const matchesQuery = doc.name.toLowerCase().includes(lowerQuery) || doc.desc.toLowerCase().includes(lowerQuery);
        const matchesCategory = (currentCategory === 'all' || doc.category === currentCategory);
        return matchesQuery && matchesCategory;
      });

      resultsCount.textContent = `Showing ${filtered.length} of ${ALL_DOCS.length} documents`;

      if (filtered.length === 0) {
        documentGrid.innerHTML = `
          <div class="col-span-full py-12 text-center bg-white rounded-2xl border border-dashed border-slate-300">
            <i data-lucide="file-x" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
            <h3 class="text-lg font-medium text-slate-700">No documents found</h3>
            <p class="text-slate-500">Try adjusting your search keywords.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      const html = filtered.map(doc => {
        // Highlighting logic
        let displayName = doc.name;
        if (query) {
          const esc = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const re = new RegExp(`(${esc})`, 'gi');
          displayName = doc.name.replace(re, '<mark class="bg-brand-100 text-brand-900 rounded px-1">$1</mark>');
        }

        const driveUrl = doc.customUrl ? doc.customUrl : `https://drive.google.com/file/d/${doc.id}/view?usp=drivesdk`;
        
        let icon = 'file-text';
        if(doc.name.toLowerCase().includes('pdf')) icon = 'file-type-2';
        if(doc.name.toLowerCase().includes('xls')) icon = 'table';
        if(doc.name.toLowerCase().includes('jpg') || doc.name.toLowerCase().includes('png')) icon = 'image';

        return `
          <div class="doc-card bg-white p-5 rounded-2xl border border-slate-200 flex flex-col h-full">
            <div class="flex items-start gap-3 mb-3">
              <div class="p-2 bg-slate-100 rounded-lg text-slate-600 shrink-0">
                <i data-lucide="${icon}" class="w-5 h-5"></i>
              </div>
              <div>
                <h3 class="font-semibold text-slate-800 line-clamp-2 leading-tight" title="${doc.name}">${displayName}</h3>
                <span class="inline-block mt-2 px-2 py-0.5 bg-slate-100 text-slate-600 text-xs rounded-full uppercase tracking-wider font-semibold">${doc.category}</span>
              </div>
            </div>
            
            <div class="mt-auto pt-4 flex gap-2">
              <a href="${driveUrl}" target="_blank" class="flex-1 inline-flex justify-center items-center gap-1.5 py-2 bg-brand-50 text-brand-700 hover:bg-brand-600 hover:text-white rounded-xl text-sm font-medium transition-colors">
                <i data-lucide="external-link" class="w-4 h-4"></i> View File
              </a>
            </div>
          </div>
        `;
      }).join('');

      documentGrid.innerHTML = html;
      lucide.createIcons();
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => renderDocuments(e.target.value));

    filterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Update styling
        filterBtns.forEach(b => {
          b.classList.remove('bg-brand-600', 'text-white');
          b.classList.add('bg-white', 'text-slate-600');
        });
        const target = e.currentTarget;
        target.classList.remove('bg-white', 'text-slate-600');
        target.classList.add('bg-brand-600', 'text-white');
        
        currentCategory = target.dataset.cat;
        renderDocuments(searchInput.value);
      });
    });

    // Initial render
    renderDocuments();
  </script>
