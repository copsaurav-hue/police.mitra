<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Mitra - Modern Cyber Dashboard</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN with Cyber Custom Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cyber: {
              950: '#050B14', // Deep Space
              900: '#0B132B', // Cyber Dark
              800: '#1C2541', // Deep Navy Slate
              700: '#3A506B', // Slate Steel
              blue: '#00F0FF', // Vivid Neon Blue
              neon: '#3B82F6', // Digital Blue
              glow: '#06B6D4', // Tactical Cyan
              danger: '#EF4444',
              success: '#10B981'
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['Space Grotesk', 'monospace'],
          },
          boxShadow: {
            'cyber-glow': '0 0 18px -3px rgba(0, 240, 255, 0.35)',
            'danger-glow': '0 0 18px -3px rgba(239, 68, 68, 0.35)',
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom CSS transitions and canvas tools -->
  <link rel="stylesheet" href="styles.css">

  <!-- SheetJS & PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- html2canvas, jsPDF & autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Tactical CDR Core Global Modules -->
  <script src="components/cdr_core/utils.js?v=3"></script>
  <script src="components/cdr_core/parser.js?v=3"></script>
  <script src="components/cdr_core/analytics.js?v=3"></script>
  <script src="components/cdr_core/store.js?v=3"></script>
  <script src="components/cdr_core/charts.js?v=3"></script>
  <script src="components/cdr_core/table.js?v=3"></script>
  <script src="components/cdr_core/map.js?v=3"></script>
  <script src="components/cdr_core/export.js?v=3"></script>
  <script src="components/cdr_core/notes.js?v=3"></script>
  <script src="components/cdr_core/suspects.js?v=3"></script>
  <script src="components/cdr_core/common.js?v=3"></script>
</head>
<body class="bg-cyber-950 font-sans text-slate-100 dark:bg-cyber-950 transition-colors duration-200" style="margin:0;">

  <!-- Minimal Cyber Scan Line for High-Tech feel -->
  <div class="pointer-events-none fixed inset-0 z-50 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,240,255,0.02)_50%),linear-gradient(90deg,rgba(255,0,0,0.02),rgba(0,255,0,0.01),rgba(0,0,255,0.02))] bg-[size:100%_4px,6px_100%]"></div>
  
  <div id="app" class="flex w-full overflow-x-hidden overflow-y-auto md:overflow-hidden min-h-screen md:h-screen">
    <!-- App Shell gets injected here -->
    <div class="flex h-full w-full items-center justify-center">
      <div class="text-center">
        <div class="inline-block h-12 w-12 animate-spin rounded-full border-4 border-cyber-blue border-t-transparent"></div>
        <p class="mt-4 text-cyber-blue font-mono text-xs tracking-widest uppercase">Initializing Police Mitra Systems...</p>
      </div>
    </div>
  </div>

  <!-- Main ES6 App Controller -->
  <script type="module" src="app.js?v=6"></script>
</body>
</html>
